<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Aarav</title>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <nav>
            <a class="logo" href="/"><img src="wedge.svg" alt="Home"></a>
            <div class="links">
                <a href="/projects">Projects</a>
                <a href="/blog">Blog</a>
                <a href="/uses">Uses</a>
                <a href="/contact">Contact</a>
            </div>
        </nav>

        <a class="back" href="/blog">&larr; Back</a>

        <div class="post" id="post"></div>
    </div>

    <script src="/blog/md.js"></script>
    <script>
        var name = new URLSearchParams(location.search).get('p');
        if (name) {
            fetch('/blog/' + name + '.md')
                .then(function(r) { return r.text(); })
                .then(function(md) {
                    document.getElementById('post').innerHTML = renderMarkdown(md);
                    var h1 = document.querySelector('.post h1');
                    if (h1) document.title = h1.textContent + ' - Aarav';
                });
        }
    </script>
</body>
</html>
